<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Hub - Player & Konverter</title>
    
    <!-- PWA Verknüpfungen -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <!-- Platzhalter für dein Icon -->
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192.png?text=AudioHub">

    <!-- Tailwind CSS für modernes Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .gradient-text {
            background: linear-gradient(to right, #1db954, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input[type="range"] {
            accent-color: #1db954;
            width: 100%;
        }
        .spin-slow {
            animation: spin 4s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .tab-btn {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md glass-panel rounded-3xl p-6 shadow-2xl relative overflow-hidden">
        
        <!-- Header -->
        <div class="text-center mb-8 relative z-10">
            <h1 class="text-3xl font-bold gradient-text mb-2">Audio Hub</h1>
            <p class="text-gray-400 text-sm">Dein privater Player & Konverter</p>
        </div>

        <!-- Tab Navigation -->
        <div class="flex bg-gray-800 rounded-full p-1 mb-6 relative z-10">
            <button onclick="switchTab('player')" id="tab-player" class="tab-btn flex-1 py-2 rounded-full bg-gray-700 font-semibold text-white">Player</button>
            <button onclick="switchTab('converter')" id="tab-converter" class="tab-btn flex-1 py-2 rounded-full text-gray-400 font-semibold hover:text-white">Konverter</button>
        </div>

        <!-- PLAYER BEREICH -->
        <div id="view-player" class="block relative z-10">
            <!-- Datei Upload -->
            <label class="block w-full border-2 border-dashed border-gray-600 rounded-xl p-4 text-center cursor-pointer hover:border-[#1db954] transition-colors mb-6">
                <i class="fas fa-music text-3xl mb-2 text-gray-400"></i>
                <p class="text-gray-300 text-sm">Lokaldatei auswählen (.mp3, .wav)</p>
                <input type="file" id="audio-upload" accept="audio/*" class="hidden" onchange="loadAudio(event)">
            </label>

            <!-- Song Info -->
            <div class="text-center mb-6">
                <div class="w-32 h-32 mx-auto bg-gray-800 rounded-full mb-4 flex items-center justify-center shadow-lg overflow-hidden border-4 border-gray-700">
                    <i class="fas fa-compact-disc text-6xl text-gray-500 transition-transform" id="disc-icon"></i>
                </div>
                <h2 id="song-title" class="text-xl font-bold truncate px-2">Kein Song geladen</h2>
            </div>

            <!-- Steuerung -->
            <div class="space-y-6">
                <!-- Fortschrittsbalken -->
                <div class="flex items-center space-x-3 text-xs text-gray-400">
                    <span id="time-current" class="w-8 text-right">0:00</span>
                    <input type="range" id="seek-bar" value="0" step="1" class="flex-1 h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                    <span id="time-total" class="w-8">0:00</span>
                </div>

                <!-- Buttons -->
                <div class="flex justify-center items-center space-x-8">
                    <button onclick="rewind10()" class="text-gray-400 hover:text-white transition"><i class="fas fa-undo text-xl"></i></button>
                    
                    <button onclick="togglePlay()" class="w-16 h-16 rounded-full bg-gradient-to-r from-[#1db954] to-[#8b5cf6] flex items-center justify-center shadow-lg transform hover:scale-105 transition">
                        <i id="play-icon" class="fas fa-play text-white text-2xl ml-1"></i>
                    </button>
                    
                    <button onclick="forward10()" class="text-gray-400 hover:text-white transition"><i class="fas fa-redo text-xl"></i></button>
                </div>
            </div>
        </div>

        <!-- KONVERTER BEREICH -->
        <div id="view-converter" class="hidden relative z-10">
            <label class="block w-full border-2 border-dashed border-gray-600 rounded-xl p-4 text-center cursor-pointer hover:border-[#8b5cf6] transition-colors mb-4">
                <i class="fas fa-file-audio text-3xl mb-2 text-gray-400"></i>
                <p class="text-gray-300 text-sm">Datei zum Konvertieren wählen</p>
                <input type="file" id="convert-upload" accept="audio/*" class="hidden" onchange="fileSelectedForConvert(event)">
            </label>

            <p id="convert-filename" class="text-center text-sm text-[#1db954] font-semibold mb-4 truncate h-5"></p>

            <div class="mb-6">
                <label class="block text-sm text-gray-400 mb-2">Zielformat:</label>
                <select id="format-select" class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-3 focus:outline-none focus:border-[#8b5cf6]">
                    <option value="mp3">MP3</option>
                    <option value="wav">WAV</option>
                    <option value="ogg">OGG</option>
                </select>
            </div>

            <button onclick="startConversion()" id="convert-btn" class="w-full py-3 rounded-xl bg-gradient-to-r from-[#8b5cf6] to-[#1db954] text-white font-bold shadow-lg transform hover:scale-[1.02] transition disabled:opacity-50 disabled:cursor-not-allowed">
                Jetzt Konvertieren
            </button>

            <!-- Fortschritt Konvertierung -->
            <div id="convert-progress" class="hidden mt-6">
                <div class="flex justify-between text-xs text-gray-400 mb-1">
                    <span id="progress-status">Konvertiere...</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2">
                    <div id="progress-bar-fill" class="bg-gradient-to-r from-[#1db954] to-[#8b5cf6] h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <button id="download-btn" class="hidden w-full mt-4 py-2 border-2 border-[#1db954] text-[#1db954] rounded-lg font-bold hover:bg-[#1db954] hover:text-white transition">
                    <i class="fas fa-download mr-2"></i> Herunterladen
                </button>
            </div>
            <p class="text-[10px] text-gray-500 text-center mt-6">Hinweis: Dies ist eine lokale Simulation für PWA-Testzwecke.</p>
        </div>

    </div>

    <script>
        // --- 1. PWA Service Worker Registrierung ---
        // Sicherstellung, dass der SW nur auf unterstützten Protokollen registriert wird
        if ('serviceWorker' in navigator && (window.location.protocol === 'http:' || window.location.protocol === 'https:')) {
            window.addEventListener('load', () => {
                const swPath = './sw.js';
                navigator.serviceWorker.register(swPath)
                    .then(reg => console.log('Service Worker registriert'))
                    .catch(err => console.warn('Service Worker Registrierung fehlgeschlagen:', err));
            });
        }

        // --- 2. Tab Logik ---
        function switchTab(tab) {
            document.getElementById('view-player').classList.toggle('hidden', tab !== 'player');
            document.getElementById('view-converter').classList.toggle('hidden', tab !== 'converter');
            
            const btnPlayer = document.getElementById('tab-player');
            const btnConverter = document.getElementById('tab-converter');

            if (tab === 'player') {
                btnPlayer.classList.add('bg-gray-700', 'text-white');
                btnPlayer.classList.remove('text-gray-400');
                btnConverter.classList.remove('bg-gray-700', 'text-white');
                btnConverter.classList.add('text-gray-400');
            } else {
                btnConverter.classList.add('bg-gray-700', 'text-white');
                btnConverter.classList.remove('text-gray-400');
                btnPlayer.classList.remove('bg-gray-700', 'text-white');
                btnPlayer.classList.add('text-gray-400');
            }
        }

        // --- 3. Audio Player Logik ---
        const audio = new Audio();
        const playIcon = document.getElementById('play-icon');
        const seekBar = document.getElementById('seek-bar');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        const discIcon = document.getElementById('disc-icon');
        let isSeeking = false;

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function loadAudio(event) {
            const file = event.target.files[0];
            if (file) {
                const objectUrl = URL.createObjectURL(file);
                audio.src = objectUrl;
                document.getElementById('song-title').innerText = file.name;
                
                audio.addEventListener('loadedmetadata', () => {
                    seekBar.max = audio.duration;
                    timeTotal.innerText = formatTime(audio.duration);
                });
                
                togglePlay(true);
            }
        }

        function togglePlay(forcePlay = false) {
            if (!audio.src) return;

            if (audio.paused || forcePlay) {
                audio.play().catch(e => console.log("Abspielen fehlgeschlagen:", e));
                playIcon.classList.replace('fa-play', 'fa-pause');
                playIcon.classList.remove('ml-1');
                discIcon.classList.add('spin-slow', 'text-[#1db954]');
                discIcon.classList.remove('text-gray-500');
            } else {
                audio.pause();
                playIcon.classList.replace('fa-pause', 'fa-play');
                playIcon.classList.add('ml-1');
                discIcon.classList.remove('spin-slow', 'text-[#1db954]');
                discIcon.classList.add('text-gray-500');
            }
        }

        function rewind10() { if(audio.src) audio.currentTime = Math.max(0, audio.currentTime - 10); }
        function forward10() { if(audio.src) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); }

        audio.addEventListener('timeupdate', () => {
            if (!isSeeking) {
                seekBar.value = audio.currentTime;
            }
            timeCurrent.innerText = formatTime(audio.currentTime);
        });

        seekBar.addEventListener('input', () => {
            isSeeking = true;
            timeCurrent.innerText = formatTime(seekBar.value);
        });
        
        seekBar.addEventListener('change', () => {
            audio.currentTime = seekBar.value;
            isSeeking = false;
        });

        audio.addEventListener('ended', () => {
            playIcon.classList.replace('fa-pause', 'fa-play');
            discIcon.classList.remove('spin-slow', 'text-[#1db954]');
        });

        // --- 4. Konverter Simulation ---
        let selectedFileForConvert = null;

        function fileSelectedForConvert(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFileForConvert = file;
                document.getElementById('convert-filename').innerText = file.name;
                document.getElementById('convert-progress').classList.add('hidden');
                document.getElementById('download-btn').classList.add('hidden');
                document.getElementById('progress-bar-fill').style.width = '0%';
                document.getElementById('progress-text').innerText = '0%';
            }
        }

        function startConversion() {
            if (!selectedFileForConvert) return;
            
            const progressContainer = document.getElementById('convert-progress');
            const barFill = document.getElementById('progress-bar-fill');
            const text = document.getElementById('progress-text');
            const btn = document.getElementById('convert-btn');
            const downloadBtn = document.getElementById('download-btn');
            const status = document.getElementById('progress-status');

            btn.disabled = true;
            progressContainer.classList.remove('hidden');
            downloadBtn.classList.add('hidden');
            status.innerText = "Konvertiere...";
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 15) + 5;
                if (progress > 100) progress = 100;
                
                barFill.style.width = `${progress}%`;
                text.innerText = `${progress}%`;

                if (progress >= 100) {
                    clearInterval(interval);
                    status.innerText = "Fertig!";
                    btn.disabled = false;
                    downloadBtn.classList.remove('hidden');
                    
                    downloadBtn.onclick = () => {
                        alert("Hinweis: Echte Konvertierung erfordert ffmpeg.wasm oder einen Server. Hier wird der Download simuliert.");
                    };
                }
            }, 400);
        }
    </script>
</body>
</html>
